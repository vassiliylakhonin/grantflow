services:
  api:
    build: .
    container_name: grantflow_api
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - CHROMA_COLLECTION_PREFIX=grantflow
      - GRANTFLOW_JOB_STORE=sqlite
      - GRANTFLOW_HITL_STORE=sqlite
      - GRANTFLOW_INGEST_STORE=sqlite
      - GRANTFLOW_SQLITE_PATH=/data/grantflow_state.db
      - GRANTFLOW_JOB_RUNNER_MODE=redis_queue
      - GRANTFLOW_JOB_RUNNER_CONSUMER_ENABLED=false
      - GRANTFLOW_JOB_RUNNER_REDIS_URL=redis://redis:6379/0
      - GRANTFLOW_JOB_RUNNER_REDIS_QUEUE_NAME=grantflow:jobs
      - GRANTFLOW_JOB_RUNNER_REDIS_MAX_ATTEMPTS=3
      - GRANTFLOW_JOB_RUNNER_REDIS_DEAD_LETTER_QUEUE_NAME=grantflow:jobs:dead
      - GRANTFLOW_ENV=dev
    depends_on:
      - chroma
      - redis
    volumes:
      - grantflow_state:/data

  worker:
    build: .
    container_name: grantflow_worker
    command: ["python", "-m", "grantflow.worker"]
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - CHROMA_COLLECTION_PREFIX=grantflow
      - GRANTFLOW_JOB_STORE=sqlite
      - GRANTFLOW_HITL_STORE=sqlite
      - GRANTFLOW_INGEST_STORE=sqlite
      - GRANTFLOW_SQLITE_PATH=/data/grantflow_state.db
      - GRANTFLOW_JOB_RUNNER_MODE=redis_queue
      - GRANTFLOW_JOB_RUNNER_CONSUMER_ENABLED=true
      - GRANTFLOW_JOB_RUNNER_REDIS_URL=redis://redis:6379/0
      - GRANTFLOW_JOB_RUNNER_REDIS_QUEUE_NAME=grantflow:jobs
      - GRANTFLOW_JOB_RUNNER_REDIS_MAX_ATTEMPTS=3
      - GRANTFLOW_JOB_RUNNER_REDIS_DEAD_LETTER_QUEUE_NAME=grantflow:jobs:dead
      - GRANTFLOW_ENV=dev
    depends_on:
      - chroma
      - redis
    volumes:
      - grantflow_state:/data

  chroma:
    image: chromadb/chroma:latest
    container_name: grantflow_chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  redis:
    image: redis:7-alpine
    container_name: grantflow_redis
    ports:
      - "6379:6379"

volumes:
  chroma_data:
  grantflow_state:
