name: Supply Chain

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  audit-and-sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]" pip-audit cyclonedx-bom

      - name: pip-audit (locked deps, non-blocking)
        continue-on-error: true
        run: |
          pip-audit -r requirements.lock --format json > pip-audit.json

      - name: Generate SBOM (CycloneDX from lockfile)
        run: |
          cyclonedx-py requirements -i requirements.lock -o sbom.cdx.json

      - name: Upload supply-chain artifacts
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: supply-chain-artifacts
          path: |
            sbom.cdx.json
            pip-audit.json
