name: LLM Eval (Grounded)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:
    inputs:
      donor_ids:
        description: "Optional donor_id filter(s), comma-separated (e.g. usaid,eu,worldbank)"
        required: false
        default: "usaid,eu,worldbank"
        type: string
      case_ids:
        description: "Optional case_id filter(s), comma-separated (overrides donor-only broad runs)"
        required: false
        default: ""
        type: string
      force_architect_rag:
        description: "Force architect_rag_enabled=true for selected cases"
        required: true
        default: true
        type: boolean
      enforce_expectations:
        description: "Run strict expectations (false = exploratory metrics-only with --skip-expectations)"
        required: true
        default: false
        type: boolean
      cases_file:
        description: "Eval cases JSON file path"
        required: true
        default: "grantflow/eval/cases/grounded_cases.json"
        type: string
      compare_to_baseline:
        description: "Optional baseline snapshot JSON path (empty disables trend comparison)"
        required: false
        default: ""
        type: string

jobs:
  llm_eval_grounded:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GRANTFLOW_LLM_BASE_URL: ${{ vars.GRANTFLOW_LLM_BASE_URL }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
      OPENROUTER_HTTP_REFERER: ${{ vars.OPENROUTER_HTTP_REFERER }}
      OPENROUTER_X_TITLE: ${{ vars.OPENROUTER_X_TITLE }}
      CHROMA_HOST: ${{ vars.CHROMA_HOST }}
      CHROMA_PORT: ${{ vars.CHROMA_PORT }}
      CHROMA_COLLECTION_PREFIX: ${{ vars.CHROMA_COLLECTION_PREFIX }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run LLM evaluation harness (grounded subset lane)
        env:
          INPUT_DONOR_IDS: ${{ github.event.inputs.donor_ids }}
          INPUT_CASE_IDS: ${{ github.event.inputs.case_ids }}
          INPUT_FORCE_ARCH_RAG: ${{ github.event.inputs.force_architect_rag }}
          INPUT_ENFORCE_EXPECTATIONS: ${{ github.event.inputs.enforce_expectations }}
          INPUT_CASES_FILE: ${{ github.event.inputs.cases_file }}
          INPUT_COMPARE_BASELINE: ${{ github.event.inputs.compare_to_baseline }}
        run: |
          mkdir -p llm-eval-grounded-artifacts
          export CHROMA_HOST="${CHROMA_HOST:-localhost}"
          export CHROMA_PORT="${CHROMA_PORT:-8001}"
          export CHROMA_COLLECTION_PREFIX="${CHROMA_COLLECTION_PREFIX:-grantflow}"
          if [ -z "${OPENAI_API_KEY:-}" ] && [ -z "${OPENROUTER_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY / OPENROUTER_API_KEY is not configured; skipping grounded LLM eval lane." | tee llm-eval-grounded-artifacts/llm-eval-grounded-report.txt
            python -c 'import json, pathlib, os; skip=(os.getenv("INPUT_ENFORCE_EXPECTATIONS","false")!="true"); pathlib.Path("llm-eval-grounded-artifacts/llm-eval-grounded-report.json").write_text(json.dumps({"suite_label":"llm-eval-grounded","skipped":True,"reason":"OPENAI_API_KEY / OPENROUTER_API_KEY is not configured","runtime_overrides":{"force_llm":True,"force_architect_rag":True,"skip_expectations":skip}}, indent=2, sort_keys=True), encoding="utf-8")'
            exit 0
          fi

          EXTRA_ARGS=()
          if [ -n "${INPUT_CASES_FILE:-}" ]; then
            EXTRA_ARGS+=(--cases-file "$INPUT_CASES_FILE")
          fi
          if [ -n "${INPUT_DONOR_IDS:-}" ]; then
            EXTRA_ARGS+=(--donor-id "$INPUT_DONOR_IDS")
          fi
          if [ -n "${INPUT_CASE_IDS:-}" ]; then
            EXTRA_ARGS+=(--case-id "$INPUT_CASE_IDS")
          fi
          if [ "${INPUT_FORCE_ARCH_RAG:-true}" = "true" ]; then
            EXTRA_ARGS+=(--force-architect-rag)
          fi
          if [ "${INPUT_ENFORCE_EXPECTATIONS:-false}" != "true" ]; then
            EXTRA_ARGS+=(--skip-expectations)
          fi
          COMPARE_BASELINE="${INPUT_COMPARE_BASELINE:-}"
          if [ -n "${COMPARE_BASELINE}" ]; then
            EXTRA_ARGS+=(--compare-to-baseline "$COMPARE_BASELINE")
            EXTRA_ARGS+=(--comparison-text-out llm-eval-grounded-artifacts/llm-eval-grounded-comparison.txt)
            EXTRA_ARGS+=(--comparison-json-out llm-eval-grounded-artifacts/llm-eval-grounded-comparison.json)
            FULL_DONORS="usaid,eu,worldbank"
            if [ -n "${INPUT_CASE_IDS:-}" ] || [ "${INPUT_DONOR_IDS:-$FULL_DONORS}" != "${FULL_DONORS}" ]; then
              EXTRA_ARGS+=(--baseline-ignore-missing-current-cases)
            fi
          fi

          python -m grantflow.eval.harness \
            --suite-label llm-eval-grounded \
            --force-llm \
            "${EXTRA_ARGS[@]}" \
            --text-out llm-eval-grounded-artifacts/llm-eval-grounded-report.txt \
            --json-out llm-eval-grounded-artifacts/llm-eval-grounded-report.json

      - name: Build grounded workflow summary
        if: always()
        run: |
          python scripts/build_llm_eval_summary.py \
            --report-json llm-eval-grounded-artifacts/llm-eval-grounded-report.json \
            --comparison-json llm-eval-grounded-artifacts/llm-eval-grounded-comparison.json \
            --title "LLM Grounded Summary" \
            --out-md llm-eval-grounded-artifacts/llm-eval-grounded-summary.md
          cat llm-eval-grounded-artifacts/llm-eval-grounded-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload grounded LLM evaluation report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: llm-eval-grounded-report
          path: llm-eval-grounded-artifacts/
          if-no-files-found: error
