services:
  api:
    build: .
    container_name: grantflow_api
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      CHROMA_COLLECTION_PREFIX: grantflow
      GRANTFLOW_JOB_STORE: sqlite
      GRANTFLOW_HITL_STORE: sqlite
      GRANTFLOW_INGEST_STORE: sqlite
      GRANTFLOW_SQLITE_PATH: /data/grantflow_state.db
      GRANTFLOW_JOB_RUNNER_MODE: redis_queue
      GRANTFLOW_JOB_RUNNER_CONSUMER_ENABLED: "false"
      GRANTFLOW_JOB_RUNNER_REDIS_URL: redis://redis:6379/0
      GRANTFLOW_JOB_RUNNER_REDIS_QUEUE_NAME: grantflow:jobs
      GRANTFLOW_JOB_RUNNER_REDIS_MAX_ATTEMPTS: "3"
      GRANTFLOW_JOB_RUNNER_REDIS_DEAD_LETTER_QUEUE_NAME: grantflow:jobs:dead
      GRANTFLOW_ENV: production
      GRANTFLOW_API_KEY: ${GRANTFLOW_API_KEY}
      GRANTFLOW_REQUIRE_API_KEY_ON_STARTUP: "true"
      GRANTFLOW_REQUIRE_PERSISTENT_STORES_ON_STARTUP: "true"
      GRANTFLOW_TENANT_AUTHZ_ENABLED: ${GRANTFLOW_TENANT_AUTHZ_ENABLED:-false}
      GRANTFLOW_ALLOWED_TENANTS: ${GRANTFLOW_ALLOWED_TENANTS:-}
      GRANTFLOW_DEFAULT_TENANT: ${GRANTFLOW_DEFAULT_TENANT:-}
    depends_on:
      - chroma
      - redis
    restart: unless-stopped
    volumes:
      - grantflow_state:/data

  worker:
    build: .
    container_name: grantflow_worker
    command: ["python", "-m", "grantflow.worker"]
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      CHROMA_COLLECTION_PREFIX: grantflow
      GRANTFLOW_JOB_STORE: sqlite
      GRANTFLOW_HITL_STORE: sqlite
      GRANTFLOW_INGEST_STORE: sqlite
      GRANTFLOW_SQLITE_PATH: /data/grantflow_state.db
      GRANTFLOW_JOB_RUNNER_MODE: redis_queue
      GRANTFLOW_JOB_RUNNER_CONSUMER_ENABLED: "true"
      GRANTFLOW_JOB_RUNNER_REDIS_URL: redis://redis:6379/0
      GRANTFLOW_JOB_RUNNER_REDIS_QUEUE_NAME: grantflow:jobs
      GRANTFLOW_JOB_RUNNER_REDIS_MAX_ATTEMPTS: "3"
      GRANTFLOW_JOB_RUNNER_REDIS_DEAD_LETTER_QUEUE_NAME: grantflow:jobs:dead
      GRANTFLOW_ENV: production
      GRANTFLOW_API_KEY: ${GRANTFLOW_API_KEY}
      GRANTFLOW_REQUIRE_API_KEY_ON_STARTUP: "true"
      GRANTFLOW_REQUIRE_PERSISTENT_STORES_ON_STARTUP: "true"
      GRANTFLOW_TENANT_AUTHZ_ENABLED: ${GRANTFLOW_TENANT_AUTHZ_ENABLED:-false}
      GRANTFLOW_ALLOWED_TENANTS: ${GRANTFLOW_ALLOWED_TENANTS:-}
      GRANTFLOW_DEFAULT_TENANT: ${GRANTFLOW_DEFAULT_TENANT:-}
    depends_on:
      - chroma
      - redis
    restart: unless-stopped
    volumes:
      - grantflow_state:/data

  chroma:
    image: chromadb/chroma:latest
    container_name: grantflow_chroma
    ports:
      - "127.0.0.1:8001:8000"
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma

  redis:
    image: redis:7-alpine
    container_name: grantflow_redis
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

volumes:
  chroma_data:
  grantflow_state:
